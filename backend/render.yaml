services:
  - type: web
    name: footy-scout-api
    runtime: python
    region: oregon
    plan: free
    branch: main

    rootDirectory: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      flask db upgrade
      python scripts/seed_db.py
      
    startCommand: >
      gunicorn wsgi:application
      --workers 2
      --worker-class sync
      --timeout 120
      --bind 0.0.0.0:$PORT
      --log-level info
      --access-logfile -
      --error-logfile -

    healthCheckPath: /health


    envVars:
      - key: FLASK_ENV
        value: production

      - key: PYTHON_VERSION
        value: "3.11.0"


      - key: DATABASE_URL
        sync: false


      # set in Render dashboard
      # SECRET_KEY                (generate with: python -c "import secrets; print(secrets.token_hex(32))")
      # JWT_SECRET_KEY            (generate same way)
      # ADMIN_EMAIL
      # ADMIN_PASSWORD
      # ADMIN_FIRST_NAME
      # ADMIN_LAST_NAME
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_API_SECRET
      # STRIPE_SECRET_KEY
      # STRIPE_PUBLISHABLE_KEY
      # STRIPE_WEBHOOK_SECRET
      # PAYPAL_CLIENT_ID
      # PAYPAL_CLIENT_SECRET
      # PAYPAL_MODE               (sandbox | live)
      # MPESA_CONSUMER_KEY
      # MPESA_CONSUMER_SECRET
      # MPESA_SHORTCODE
      # MPESA_PASSKEY
      # MPESA_CALLBACK_URL        (https://footy-scout-api.onrender.com/api/v1/payments/mpesa/callback)
      # MPESA_ENV                 (sandbox | production)
      # MAIL_SERVER
      # MAIL_PORT
      # MAIL_USE_TLS
      # MAIL_USERNAME
      # MAIL_PASSWORD
      # MAIL_DEFAULT_SENDER
      # FRONTEND_URL              (https://yourfrontend.com)
      # SENTRY_DSN                (optional)
      # REDIS_URL                 (optional — for Redis-backed rate limiting)


